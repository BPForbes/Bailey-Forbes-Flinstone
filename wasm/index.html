  -->

    body { font-family: system-ui, sans-serif; margin: 16px; background: #111; color: #ddd; }
    h1 { font-size: 1.15rem; }

  </style>
</head>
<body>
  <h1>Flinstone Shell · WebAssembly</h1>
  <p>Loads the embedded x86 VM in the browser (same as <code>-Virtualization -y -vm</code>). Build with <code>make wasm</code>, then serve this directory with COOP/COEP headers so pthreads work.</p>
