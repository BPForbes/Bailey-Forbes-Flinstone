name: CI

on:
  push:
    branches: [ "main", "develop", "milestone/**", "claude/**", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-x86_64:
    name: Build & test (x86_64 GAS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc binutils nasm

      - name: Build (x86_64 GAS)
        run: make ARCH=x86_64_gas

      - name: Smoke test
        run: ./BPForbes_Flinstone_Shell -v

      - name: Unit tests — memory ASM
        run: make test_mem_asm

      - name: Unit tests — invariants
        run: make test_invariants

      - name: Unit tests — priority queue
        run: make test_priority_queue

      - name: Unit tests — fs_jail
        run: make test_fs_jail

      - name: Build (x86_64 NASM)
        run: make clean && make ARCH=x86_64_nasm

  build-arm:
    name: Build (AArch64 cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Build (ARM / AArch64)
        run: make ARCH=arm

  build-vm:
    name: Build (VM enabled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc binutils nasm

      - name: Build (VM)
        run: make VM_ENABLE=1
